<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interior Greenscapes - Professional interior plantscaping, green walls, and plant design services in Boise, Idaho since 1995." />
    <title>Interior Greenscapes | Professional Plant Design & Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Raleway:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <!-- Google Analytics 4 — replace GA_MEASUREMENT_ID with your actual ID (e.g. G-XXXXXXXXXX) -->
    <!-- Or set VITE_GA_MEASUREMENT_ID in your .env file -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'GA_MEASUREMENT_ID');
    </script>
  <style>
    #ig-loader {
      position: fixed;
      inset: 0;
      background: #263012;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }
    #ig-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #ig-loader svg {
      width: 48px;
      height: 48px;
      opacity: 0.6;
      animation: ig-pulse 1.6s ease-in-out infinite;
    }
    @keyframes ig-pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.95); }
      50%       { opacity: 0.7; transform: scale(1.05); }
    }
  </style>
  </head>
  <body>
    <!-- Loading screen — hidden once fonts + JS are ready -->
    <div id="ig-loader">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 8 C32 8 18 20 18 34 C18 44 24 52 32 56 C40 52 46 44 46 34 C46 20 32 8 32 8Z" fill="#9daf6f"/>
        <path d="M32 28 C32 28 20 36 22 46" stroke="#c5d4b8" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M32 28 C32 28 44 36 42 46" stroke="#c5d4b8" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      document.fonts.ready.then(function () {
        requestAnimationFrame(function () {
          var loader = document.getElementById('ig-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(function () { loader.remove(); }, 520);
          }
        });
      });
    </script>
  </body>
</html>
